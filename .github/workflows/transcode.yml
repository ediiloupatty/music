# Transcode MP3 quality variants (q320/ & q128/) on GitHub's runners so the
# job never touches the owner's home internet quota. The script only processes
# variants that don't exist yet, so every run resumes exactly where the last
# one stopped — scheduled runs keep chipping away until the whole library is
# done, after which each run exits in seconds ("0 variants missing").
name: Transcode audio variants

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max variants this run (0 = unlimited)"
        default: "1000"
        required: false
  schedule:
    # Every 6 hours until the library is fully transcoded. Safe to leave on:
    # once done, runs are no-ops. Disable in the Actions tab when finished.
    - cron: "0 */6 * * *"

concurrency:
  group: transcode
  cancel-in-progress: false

jobs:
  transcode:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install script dependencies
        run: npm install --no-save --no-audit --no-fund @aws-sdk/client-s3 dotenv

      - name: Transcode missing variants
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node scripts/transcode-variants.mjs --limit ${{ inputs.limit || '1000' }}
